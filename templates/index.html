<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outlook 邮件管理</title>
    <link rel="icon" href="{{ url_for('favicon') }}" type="image/svg+xml">
    <!-- DOMPurify for XSS protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('bundled_index_css') }}">
</head>

<body>
    {% include "partials/index/layout.html" %}
    {% include "partials/index/dialogs-primary.html" %}
    {% include "partials/index/dialogs-management.html" %}
    {% include "partials/index/dialogs-oauth.html" %}

    <!-- 消息提示 -->
    <div class="toast" id="toast"></div>

    <script src="{{ url_for('static', filename='js/index/01-core.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/02-groups.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/03-temp-emails.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/04-accounts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/05-emails.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/06-utils-oauth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/07-settings.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/08-refresh.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/09-tags.js') }}"></script>
    <script src="{{ url_for('static', filename='js/index/10-batch-actions.js') }}"></script>

    <!-- 全屏查看邮件模态框 -->
    <div id="fullscreenEmailModal" class="fullscreen-email-modal" onclick="closeFullscreenEmailOnBackdrop(event)">
        <div class="fullscreen-email-header">
            <div class="fullscreen-email-title" id="fullscreenEmailTitle">邮件详情</div>
            <button class="fullscreen-close-btn" onclick="closeFullscreenEmail()">×</button>
        </div>
        <div class="fullscreen-email-content" id="fullscreenEmailContent">
            <!-- 邮件内容将在这里显示 -->
        </div>
    </div>
</body>

</html>
